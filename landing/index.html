<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Monitore sua pressão arterial de forma simples e segura, com privacidade total."/>
  <title>dPressão — Monitore seu coração</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#050508;color:#fff;font-family:'SF Pro Display','Inter',system-ui,sans-serif}
    /* overflow-x:clip removido — causa bug de clip em position:fixed com scroll no Chrome */
    /* sem track: usamos wheel-based fake scroll (page nunca scrolls) */
    /* fixed stage — SEM overflow:hidden (causa bug de clip no Chrome com scroll) */
    .stage{
      position:fixed;top:0;left:0;
      height:100vh;width:100vw;
      background:#050508;
      z-index:0;
    }
    /* Wrapper do Spline: faz o clip isolado sem afetar o stage */
    #splineWrapper{
      position:absolute;inset:0;
      overflow:hidden;
      z-index:0;
    }

    /* ── canvas (spiral) ── */
    #cv{position:absolute;inset:0;width:100%;height:100%;z-index:1}

    /* ── heart: outer = anime.js controlled (agora controla o Spline overlay) ── */
    #heartOuter{
      position:absolute;
      left:50%;top:42%;
      transform:translate(-50%,-50%);
      width:420px;height:420px;
      z-index:3;
      display:none; /* SVG fallback oculto: Spline é o coração principal */
    }
    #heartInner{
      width:100%;height:100%;
      animation:hb 1.1s ease-in-out infinite;
    }
    @keyframes hb{
      0%,100%{transform:scale(1);filter:drop-shadow(0 0 50px rgba(255,23,68,.5))}
      14%{transform:scale(1.04);filter:drop-shadow(0 0 90px rgba(255,23,68,.9))}
      28%{transform:scale(1)}
      42%{transform:scale(1.02);filter:drop-shadow(0 0 65px rgba(255,23,68,.65))}
    }
    /* heartInner precisa de relative para o fallback absolute funcionar */
    #heartInner{ position:relative; }

    /* Spline iframe — dentro do stage, z-index 0, sem mix-blend-mode */
    /* O fundo do Spline é quase preto como o nosso: grid invisível */
    #splineHeart{
      position:absolute;
      /* Zoom no coração (esquerdo da cena HUD): fica centralizado assim */
      width:190%;height:190%;
      top:-45%;left:-25%;
      border:none;
      pointer-events:none;
      z-index:0;
      opacity:0.92;
    }
    /* Fallback SVG — oculto por padrão; mostra só se Spline falhar */
    #heartFallback{
      transition: opacity 1.5s ease;
    }

    /* ── veins layer ── */
    #veins{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0}
    #veins svg{width:100%;height:100%}
    .vp{fill:none;stroke-dasharray:2200;stroke-dashoffset:2200}
    .vp.m{stroke:#CC0000;stroke-width:1.8;filter:drop-shadow(0 0 5px rgba(204,0,0,.7))}
    .vp.t{stroke:#6B0000;stroke-width:0.9}

    /* ── scenes: each is absolute inset-0, starts hidden ── */
    .sc{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:5;pointer-events:none;
      opacity:0;visibility:hidden;
    }

    /* ── S0 hero ── */
    #s0{justify-content:flex-end;padding-bottom:12vh}
    .h-name{
      font-size:clamp(52px,9vw,108px);font-weight:900;
      letter-spacing:-3px;text-align:center;line-height:1;
      color:#fff;
      text-shadow:0 0 60px rgba(255,23,68,.6),0 2px 4px rgba(0,0,0,.8);
      margin-bottom:14px;
    }
    .h-sub{
      font-size:clamp(12px,1.6vw,16px);letter-spacing:5px;
      text-transform:uppercase;color:rgba(255,255,255,.38);text-align:center;
    }

    /* ── S1 tagline ── */
    #s1{justify-content:flex-end;padding-bottom:10vh}
    .tag{
      font-size:clamp(28px,5vw,58px);font-weight:700;
      text-align:center;line-height:1.15;
      max-width:640px;padding:0 24px;
    }
    .tag span{color:#FF1744}

    /* ── S2 numbers ── */
    .bp-row{display:flex;align-items:baseline;justify-content:center;gap:8px;line-height:1}
    .bpn{font-size:clamp(88px,15vw,168px);font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
    .sys{color:#FF1744;text-shadow:0 0 50px rgba(255,23,68,.5)}
    .dia{color:rgba(255,255,255,.65)}
    .sep{font-size:clamp(44px,8vw,88px);font-weight:300;color:rgba(255,255,255,.22);line-height:1}
    .bp-lbl{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.24);text-align:center;margin-top:10px}
    .bp-ok{font-size:18px;color:#22C55E;letter-spacing:3px;text-transform:uppercase;margin-top:20px;opacity:0}

    /* ── S3 ecg ── */
    .ecg-w{width:min(820px,90vw);text-align:center}
    .ecg-svg{width:100%;height:96px}
    .ecg-p{fill:none;stroke:#FF1744;stroke-width:2.2;stroke-dasharray:2200;stroke-dashoffset:2200;filter:drop-shadow(0 0 8px rgba(255,23,68,.9))}
    .priv{margin-top:36px;font-size:clamp(20px,3.5vw,38px);font-weight:600;line-height:1.3;opacity:0}
    .priv em{font-style:normal;color:#FF1744}

    /* ── S4 cta ── */
    .cta-pre{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.26);margin-bottom:20px}
    .cta-ttl{font-size:clamp(36px,6vw,72px);font-weight:800;text-align:center;line-height:1.05;margin-bottom:44px}
    .btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
    .btn{
      display:flex;align-items:center;gap:12px;
      padding:15px 30px;border-radius:16px;
      font-size:15px;font-weight:600;
      text-decoration:none;pointer-events:all;
      transition:transform .2s,box-shadow .2s;
      opacity:0;
    }
    .btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(255,23,68,.3)}
    .ios{background:#fff;color:#000}
    .and{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.14)}
    .btxt-s{font-size:10px;font-weight:400;opacity:.55;display:block}
    .btxt-m{display:block}

    /* ── chrome ── */
    #prog{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#8B0000,#FF1744);box-shadow:0 0 8px rgba(255,23,68,.7);z-index:200;transition:width .08s linear}
    #dnav{position:fixed;right:22px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:200}
    .dd{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
    .dd.on{background:#FF1744;box-shadow:0 0 8px rgba(255,23,68,.8);transform:scale(1.5)}
    #hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;transition:opacity .5s}
    .hs{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2)}
    .hl{width:1px;height:36px;background:linear-gradient(to bottom,#FF1744,transparent);animation:sl 1.6s ease-in-out infinite}
    @keyframes sl{0%{transform:scaleY(0);transform-origin:top;opacity:1}49%{transform:scaleY(1);transform-origin:top}50%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}
    body::after{content:'';position:fixed;inset:0;z-index:190;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
  </style>
</head>
<body>
  <!-- conteúdo virá nos tasks seguintes -->
</body>
</html>
