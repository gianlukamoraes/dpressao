<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Monitore sua pressão arterial de forma simples e segura, com privacidade total."/>
  <title>dPressão — Monitore seu coração</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#050508;color:#fff;font-family:'SF Pro Display','Inter',system-ui,sans-serif}
    /* overflow-x:clip removido — causa bug de clip em position:fixed com scroll no Chrome */
    /* sem track: usamos wheel-based fake scroll (page nunca scrolls) */
    /* fixed stage — SEM overflow:hidden (causa bug de clip no Chrome com scroll) */
    .stage{
      position:fixed;top:0;left:0;
      height:100vh;width:100vw;
      background:#050508;
      z-index:0;
    }
    /* Wrapper do Spline: faz o clip isolado sem afetar o stage */
    #splineWrapper{
      position:absolute;inset:0;
      overflow:hidden;
      z-index:0;
    }

    /* ── canvas (spiral) ── */
    #cv{position:absolute;inset:0;width:100%;height:100%;z-index:1}

    /* ── heart: outer = anime.js controlled (agora controla o Spline overlay) ── */
    #heartOuter{
      position:absolute;
      left:50%;top:42%;
      transform:translate(-50%,-50%);
      width:420px;height:420px;
      z-index:3;
      display:none; /* SVG fallback oculto: Spline é o coração principal */
    }
    #heartInner{
      width:100%;height:100%;
      animation:hb 1.1s ease-in-out infinite;
    }
    @keyframes hb{
      0%,100%{transform:scale(1);filter:drop-shadow(0 0 50px rgba(255,23,68,.5))}
      14%{transform:scale(1.04);filter:drop-shadow(0 0 90px rgba(255,23,68,.9))}
      28%{transform:scale(1)}
      42%{transform:scale(1.02);filter:drop-shadow(0 0 65px rgba(255,23,68,.65))}
    }
    /* heartInner precisa de relative para o fallback absolute funcionar */
    #heartInner{ position:relative; }

    /* Spline iframe — dentro do stage, z-index 0, sem mix-blend-mode */
    /* O fundo do Spline é quase preto como o nosso: grid invisível */
    #splineHeart{
      position:absolute;
      /* Zoom no coração (esquerdo da cena HUD): fica centralizado assim */
      width:190%;height:190%;
      top:-45%;left:-25%;
      border:none;
      pointer-events:none;
      z-index:0;
      opacity:0.92;
    }
    /* Fallback SVG — oculto por padrão; mostra só se Spline falhar */
    #heartFallback{
      transition: opacity 1.5s ease;
    }

    /* ── veins layer ── */
    #veins{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0}
    #veins svg{width:100%;height:100%}
    .vp{fill:none;stroke-dasharray:2200;stroke-dashoffset:2200}
    .vp.m{stroke:#CC0000;stroke-width:1.8;filter:drop-shadow(0 0 5px rgba(204,0,0,.7))}
    .vp.t{stroke:#6B0000;stroke-width:0.9}

    /* ── scenes: each is absolute inset-0, starts hidden ── */
    .sc{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:5;pointer-events:none;
      opacity:0;visibility:hidden;
    }

    /* ── S0 hero ── */
    #s0{justify-content:flex-end;padding-bottom:12vh}
    .h-name{
      font-size:clamp(52px,9vw,108px);font-weight:900;
      letter-spacing:-3px;text-align:center;line-height:1;
      color:#fff;
      text-shadow:0 0 60px rgba(255,23,68,.6),0 2px 4px rgba(0,0,0,.8);
      margin-bottom:14px;
    }
    .h-sub{
      font-size:clamp(12px,1.6vw,16px);letter-spacing:5px;
      text-transform:uppercase;color:rgba(255,255,255,.38);text-align:center;
    }

    /* ── S1 tagline ── */
    #s1{justify-content:flex-end;padding-bottom:10vh}
    .tag{
      font-size:clamp(28px,5vw,58px);font-weight:700;
      text-align:center;line-height:1.15;
      max-width:640px;padding:0 24px;
    }
    .tag span{color:#FF1744}

    /* ── S2 numbers ── */
    .bp-row{display:flex;align-items:baseline;justify-content:center;gap:8px;line-height:1}
    .bpn{font-size:clamp(88px,15vw,168px);font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
    .sys{color:#FF1744;text-shadow:0 0 50px rgba(255,23,68,.5)}
    .dia{color:rgba(255,255,255,.65)}
    .sep{font-size:clamp(44px,8vw,88px);font-weight:300;color:rgba(255,255,255,.22);line-height:1}
    .bp-lbl{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.24);text-align:center;margin-top:10px}
    .bp-ok{font-size:18px;color:#22C55E;letter-spacing:3px;text-transform:uppercase;margin-top:20px;opacity:0}

    /* ── S3 ecg ── */
    .ecg-w{width:min(820px,90vw);text-align:center}
    .ecg-svg{width:100%;height:96px}
    .ecg-p{fill:none;stroke:#FF1744;stroke-width:2.2;stroke-dasharray:2200;stroke-dashoffset:2200;filter:drop-shadow(0 0 8px rgba(255,23,68,.9))}
    .priv{margin-top:36px;font-size:clamp(20px,3.5vw,38px);font-weight:600;line-height:1.3;opacity:0}
    .priv em{font-style:normal;color:#FF1744}

    /* ── S4 cta ── */
    .cta-pre{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.26);margin-bottom:20px}
    .cta-ttl{font-size:clamp(36px,6vw,72px);font-weight:800;text-align:center;line-height:1.05;margin-bottom:44px}
    .btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
    .btn{
      display:flex;align-items:center;gap:12px;
      padding:15px 30px;border-radius:16px;
      font-size:15px;font-weight:600;
      text-decoration:none;pointer-events:all;
      transition:transform .2s,box-shadow .2s;
      opacity:0;
    }
    .btn:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(255,23,68,.3)}
    .ios{background:#fff;color:#000}
    .and{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.14)}
    .btxt-s{font-size:10px;font-weight:400;opacity:.55;display:block}
    .btxt-m{display:block}

    /* ── chrome ── */
    #prog{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#8B0000,#FF1744);box-shadow:0 0 8px rgba(255,23,68,.7);z-index:200;transition:width .08s linear}
    #dnav{position:fixed;right:22px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:200}
    .dd{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
    .dd.on{background:#FF1744;box-shadow:0 0 8px rgba(255,23,68,.8);transform:scale(1.5)}
    #hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;transition:opacity .5s}
    .hs{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2)}
    .hl{width:1px;height:36px;background:linear-gradient(to bottom,#FF1744,transparent);animation:sl 1.6s ease-in-out infinite}
    @keyframes sl{0%{transform:scaleY(0);transform-origin:top;opacity:1}49%{transform:scaleY(1);transform-origin:top}50%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}
    body::after{content:'';position:fixed;inset:0;z-index:190;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
  </style>
</head>
<body>
<div id="prog"></div>
<nav id="dnav">
  <div class="dd on"></div><div class="dd"></div><div class="dd"></div><div class="dd"></div><div class="dd"></div>
</nav>

<div class="stage">
  <!-- Wrapper faz overflow:hidden no Spline sem quebrar o stage -->
  <div id="splineWrapper">
    <iframe id="splineHeart"
      src="https://my.spline.design/hearthealthhudfuturisticuidesign-93eAnzysBJHcHg87NPt5hzqG/?bg=false"
      frameborder="0"
      allowtransparency="true"
    ></iframe>
  </div>

  <canvas id="cv"></canvas>

  <!-- veins -->
  <div id="veins">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <path class="vp m" d="M720,450 C570,365 365,272 138,248 C65,241 18,258 0,272"/>
      <path class="vp m" d="M720,450 C870,360 1075,268 1302,245 C1378,238 1422,255 1440,270"/>
      <path class="vp m" d="M720,450 C698,295 672,165 645,42"/>
      <path class="vp m" d="M720,450 C742,295 768,165 795,42"/>
      <path class="vp m" d="M720,450 C570,538 362,625 138,670 C62,688 16,690 0,692"/>
      <path class="vp m" d="M720,450 C872,542 1082,628 1305,672 C1382,690 1426,692 1440,694"/>
      <path class="vp t" d="M425,338 C362,300 288,282 202,300 C150,312 105,335 68,356"/>
      <path class="vp t" d="M1018,335 C1082,297 1162,280 1250,298 C1305,310 1358,333 1396,354"/>
      <path class="vp t" d="M674,196 C656,140 636,88 608,34"/>
      <path class="vp t" d="M766,196 C784,140 804,88 832,34"/>
      <path class="vp t" d="M562,552 C498,595 412,638 312,665 C235,683 158,686 98,688"/>
      <path class="vp t" d="M882,550 C948,593 1035,636 1138,663 C1218,681 1298,684 1362,687"/>
    </svg>
  </div>

  <!-- Heart container: pulsa via CSS, serve de âncora de glow sobre o Spline -->
  <div id="heartOuter"><div id="heartInner">
    <!-- SVG fallback visível como reforço gráfico sobre o Spline -->
    <svg id="heartFallback" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;inset:0;width:100%;height:100%;opacity:0.4">
      <defs>
        <radialGradient id="hg" cx="38%" cy="32%" r="65%">
          <stop offset="0%"   stop-color="#FF4040"/>
          <stop offset="30%"  stop-color="#CC0000"/>
          <stop offset="70%"  stop-color="#800000"/>
          <stop offset="100%" stop-color="#1A0000"/>
        </radialGradient>
        <filter id="gf">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <ellipse cx="138" cy="160" rx="106" ry="98" fill="rgba(80,0,0,.22)" filter="url(#gf)"/>
      <path d="M142 72 C162 64,192 66,212 82 C230 96,238 120,236 148 C234 174,224 198,208 218
               C192 237,170 250,148 256 C128 262,108 254,92 240 C74 224,62 200,60 172
               C58 146,66 118,82 98 C96 80,118 68,140 66 C141 65,141 65,142 72Z"
        fill="url(#hg)" stroke="rgba(255,70,70,.35)" stroke-width=".9" filter="url(#gf)" opacity=".97"/>
      <!-- Aortic arch -->
      <path d="M150 72 C152 50,156 34,163 22 C170 10,183 4,196 4 C211 4,223 12,228 24 C234 38,230 54,220 64 C214 70,207 74,200 76"
        fill="none" stroke="#BB1111" stroke-width="10" stroke-linecap="round" opacity=".9"/>
      <!-- Pulmonary trunk -->
      <path d="M136 74 C130 58, 120 44, 106 34 C96 26, 82 22, 72 26"
        fill="none" stroke="#440000" stroke-width="10" stroke-linecap="round" opacity=".65"/>
      <!-- Tube -->
      <path d="M 136 74 C 130 58, 120 44, 106 34 C 96 26, 82 22, 72 26"
        fill="none" stroke="#881111" stroke-width="7" stroke-linecap="round" opacity=".82"/>

      <!-- SUPERIOR VENA CAVA — enters right atrium from upper right -->
      <path d="M 234 108 C 244 90, 248 66, 244 44 C 241 28, 234 16, 225 10"
        fill="none" stroke="#3D0000" stroke-width="8" stroke-linecap="round" opacity=".72"/>
      <path d="M 234 108 C 244 90, 248 66, 244 44 C 241 28, 234 16, 225 10"
        fill="none" stroke="#660000" stroke-width="5" stroke-linecap="round" opacity=".7"/>

      <!-- ── CORONARY ARTERIES (surface vessels) ── -->

      <!-- Left anterior descending (LAD) — runs down the front center groove -->
      <path d="M 146 92 C 144 118, 140 148, 138 180 C 136 206, 136 222, 138 240"
        fill="none" stroke="#FF3333" stroke-width="2" opacity=".5"/>

      <!-- Diagonal branches off LAD (smaller vessels going left) -->
      <path d="M 144 116 C 132 120, 118 122, 106 118" fill="none" stroke="#EE2222" stroke-width="1.1" opacity=".38"/>
      <path d="M 142 144 C 130 150, 116 152, 104 146" fill="none" stroke="#EE2222" stroke-width="1"   opacity=".32"/>
      <path d="M 141 172 C 128 178, 114 179, 104 174" fill="none" stroke="#DD2222" stroke-width=".9"  opacity=".28"/>

      <!-- Right coronary artery (RCA) — curves along the right atrioventricular groove -->
      <path d="M 196 86 C 218 106, 234 132, 234 158 C 234 182, 222 206, 205 222"
        fill="none" stroke="#CC1111" stroke-width="1.8" opacity=".42"/>

      <!-- Circumflex branch — curves around the left side -->
      <path d="M 140 92 C 108 100, 82 118, 70 148 C 64 168, 66 192, 76 212"
        fill="none" stroke="#BB1111" stroke-width="1.4" opacity=".36"/>

      <!-- Apex vessel -->
      <path d="M 138 236 C 139 244, 141 250, 143 255"
        fill="none" stroke="#AA0000" stroke-width="1.5" opacity=".4"/>

      <!-- Interventricular groove (subtle dark line between ventricles) -->
      <path d="M 145 94 C 144 128, 142 168, 141 210 C 141 222, 141 234, 142 244"
        fill="none" stroke="rgba(20,0,0,.55)" stroke-width="1.1"/>

    </svg>
  </div></div>

  <!-- S0: HERO -->
  <div class="sc" id="s0">
    <div id="hname" class="h-name">dPressão</div>
    <div id="hsub" class="h-sub">Monitore. Entenda. Viva melhor.</div>
  </div>

  <!-- S1: TAGLINE -->
  <div class="sc" id="s1" style="justify-content:flex-end;padding-bottom:9vh">
    <p class="tag" id="tag1">Seu coração fala.<br/><span>Você precisa ouvir.</span></p>
  </div>

  <!-- S2: BP -->
  <div class="sc" id="s2">
    <div>
      <div class="bp-row">
        <span class="bpn sys" id="bpS">0</span>
        <span class="sep">/</span>
        <span class="bpn dia" id="bpD">0</span>
      </div>
      <div class="bp-lbl">sistólica &nbsp;/&nbsp; diastólica</div>
      <div class="bp-ok" id="bpOk">● Normal</div>
    </div>
  </div>

  <!-- S3: ECG -->
  <div class="sc" id="s3">
    <div class="ecg-w">
      <svg class="ecg-svg" viewBox="0 0 820 96">
        <path class="ecg-p" id="ecgP"
          d="M0,48 L72,48 L90,48 L100,35 L112,70 L127,4 L142,84 L157,48 L200,48
             L272,48 L290,48 L300,35 L312,70 L327,4 L342,84 L357,48 L400,48
             L472,48 L490,48 L500,35 L512,70 L527,4 L542,84 L557,48 L600,48
             L672,48 L690,48 L700,35 L712,70 L727,4 L742,84 L757,48 L820,48"/>
      </svg>
      <p class="priv" id="priv">
        Seus dados ficam<br/><em>só no seu dispositivo.</em><br/>Sempre.
      </p>
    </div>
  </div>

  <!-- S4: CTA -->
  <div class="sc" id="s4">
    <p class="cta-pre">Disponível agora</p>
    <h2 class="cta-ttl">Comece a cuidar<br/>do seu coração</h2>
    <div class="btns">
      <a href="#" class="btn ios" id="b1">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="black">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        <span><span class="btxt-s">Download na</span><span class="btxt-m">App Store</span></span>
      </a>
      <a href="#" class="btn and" id="b2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M3,20.5v-17c0-.83.93-1.3 1.6-.8l14,8.5c.63.38.63 1.32 0 1.7l-14,8.5C3.93,21.8,3,21.33,3,20.5z"/>
        </svg>
        <span><span class="btxt-s">Disponível no</span><span class="btxt-m">Google Play</span></span>
      </a>
    </div>
  </div>

  <!-- hint -->
  <div id="hint"><span class="hs">scroll</span><div class="hl"></div></div>
</div>
</body>
</html>
